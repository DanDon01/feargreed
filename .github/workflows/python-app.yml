name: Python Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Hardware libs (RPi.GPIO, st7789, displayhatmini) are Pi-only;
        # tests run against the desktop mock with just these
        pip install numpy pillow requests pytest

    - name: Test with pytest
      run: pytest tests/ -v
